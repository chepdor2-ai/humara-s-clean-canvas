services:
  - type: web
    name: humara
    runtime: node
    buildCommand: cd humanizer-engine/frontend && npm install && npm run build
    startCommand: cd humanizer-engine/frontend && npx next start --hostname 0.0.0.0 --port $PORT
    envVars:
      - key: NODE_ENV
        value: production
      - key: OXYGEN3_API_URL
        fromService:
          name: oxygen3
          type: web
          property: host

  - type: web
    name: oxygen3
    runtime: python
    buildCommand: pip install torch --index-url https://download.pytorch.org/whl/cpu && pip install transformers fastapi "uvicorn[standard]" safetensors pydantic
    startCommand: python oxygen3_server.py
    envVars:
      - key: OXYGEN3_MODEL_DIR
        value: oxygen3-model
    plan: standard
