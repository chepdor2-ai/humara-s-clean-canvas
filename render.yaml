services:
  - type: web
    name: oxygen3
    runtime: docker
    dockerfilePath: render-oxygen3/Dockerfile
    dockerContext: .
    envVars:
      - key: OXYGEN3_MODEL_DIR
        value: /app/oxygen3-model
      - key: HF_MODEL_REPO
        value: maguna956/oxygen3-humanizer
      - key: HF_TOKEN
        sync: false
    plan: standard
    healthCheckPath: /health
