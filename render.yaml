services:
  - type: web
    name: grammar-backend
    runtime: docker
    dockerfilePath: grammar_backend/Dockerfile
    dockerContext: grammar_backend
    envVars:
      - key: GRAMMAR_HOST
        value: "0.0.0.0"
      - key: GRAMMAR_PORT
        value: "8000"
    plan: starter
    healthCheckPath: /health

  - type: web
    name: king-server
    runtime: docker
    dockerfilePath: king-server/Dockerfile
    dockerContext: .
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: LLM_MODEL
        value: "gpt-4o-mini"
      - key: KING_CONCURRENCY
        value: "10"
    plan: starter
    healthCheckPath: /health

  - type: web
    name: oxygen3
    runtime: docker
    dockerfilePath: render-oxygen3/Dockerfile
    dockerContext: .
    envVars:
      - key: OXYGEN3_MODEL_DIR
        value: /app/oxygen3-model
      - key: HF_MODEL_REPO
        value: maguna956/oxygen3-humanizer
      - key: HF_TOKEN
        sync: false
    plan: standard
    healthCheckPath: /health
