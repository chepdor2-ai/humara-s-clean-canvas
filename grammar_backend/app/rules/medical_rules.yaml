rules:
  - id: med-001
    name: patient_vs_patience
    pattern: '\bpatience\b(?=\s+(?:was|were|is|are|has|had|received|underwent|presented))'
    replacement: 'patient'
    category: grammar
    description: "Correct 'patience' to 'patient' in medical context"
    priority: 70
    confidence: 0.88
    domain: [medical]

  - id: med-002
    name: mg_spacing
    pattern: '(\d)mg\b'
    replacement: '\1 mg'
    category: spacing
    description: "Add space between number and mg"
    priority: 65
    confidence: 0.95
    domain: [medical]

  - id: med-003
    name: ml_spacing
    pattern: '(\d)ml\b'
    replacement: '\1 ml'
    category: spacing
    description: "Add space between number and ml"
    priority: 65
    confidence: 0.95
    domain: [medical]

  - id: med-004
    name: kg_spacing
    pattern: '(\d)kg\b'
    replacement: '\1 kg'
    category: spacing
    description: "Add space between number and kg"
    priority: 65
    confidence: 0.95
    domain: [medical]

  - id: med-005
    name: diagnosis_plural
    pattern: '\bdiagnosises\b'
    replacement: 'diagnoses'
    category: grammar
    description: "Correct 'diagnosises' to 'diagnoses'"
    priority: 75
    confidence: 0.95
    domain: [medical, general]

  - id: med-006
    name: prostate_prostrate
    pattern: '\bprostrate\b(?=\s+(?:cancer|gland|exam|biopsy|surgery))'
    replacement: 'prostate'
    category: grammar
    description: "Correct 'prostrate' to 'prostate' in medical context"
    priority: 70
    confidence: 0.88
    domain: [medical]
